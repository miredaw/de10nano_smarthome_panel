<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DE10-Nano Smart Home Monitor{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Top Navigation Bar -->
        <header class="top-nav">
            <div class="logo-brand">
                🏠 Monitor
            </div>
            
            <nav class="nav-pills">
                <a href="/" class="nav-pill {% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
                <a href="/sensors" class="nav-pill {% if page == 'sensors' %}active{% endif %}">Sensors</a>
                <a href="/communication" class="nav-pill {% if page == 'communication' %}active{% endif %}">Communication</a>
                <a href="/security" class="nav-pill {% if page == 'security' %}active{% endif %}">Security</a>
                <a href="/event-logs" class="nav-pill {% if page == 'event-logs' %}active{% endif %}">Event Logs</a>
                <a href="/settings" class="nav-pill {% if page == 'settings' %}active{% endif %}">Settings</a>
            </nav>
            
            <div class="nav-right">
                <div class="wifi-status">
                    <span class="status-dot"></span>
                    <span>WiFi</span>
                </div>
                <button class="icon-btn notification-btn">🔔</button>
                <button class="icon-btn user-btn">👤</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>

        <!-- Footer -->
        <footer class="footer">
            <span>DE10-Nano Smart Home Monitor | ARM Cortex-A9 HPS + Cyclone V FPGA | Electronics for Embedded Systems</span>
            <span class="footer-author">Seyed Milad Abedi Arzefooni</span>
        </footer>
    </div>

    <!-- SVG Gradient Definitions -->
    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#7fcd91;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#a8e6b5;stop-opacity:1" />
            </linearGradient>
        </defs>
    </svg>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    {% block extra_js %}
    {% endblock %}
</body>
</html>
